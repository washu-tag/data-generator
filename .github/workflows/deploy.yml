name: Build and publish
on:
  push:
env:
  REGISTRY: ghcr.io
jobs:
  build_test_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
        with:
          cache-disabled: true

      - name: Publish query_test_spec
        run: cd query_test_spec && ./gradlew publish
        env:
          MAVEN_USERNAME: ${{ secrets.XNAT_JFROG_USER }}
          MAVEN_PASSWORD: ${{ secrets.XNAT_JFROG_TOKEN }}

      - name: Run tests
        run: ./gradlew test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ ENV.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: image
        run: |
          set -euo pipefail
          # Release tags publish the image under the raw tag name (matching the release chart's appVersion).
          # Every other push refreshes the moving :latest that the dev chart's appVersion tracks.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="latest"
          fi
          echo "ref=${REGISTRY}/washu-tag/data-generator:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          tags: ${{ steps.image.outputs.ref }}
          push: true
